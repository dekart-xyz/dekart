name: Release

on:
  push:
    tags: ['**']                       # any tag (vX.Y.Z, nightly‑foo, …)

permissions:
  contents: read
  packages: write

jobs:
  release_meta:
    runs-on: ubuntu-latest
    outputs:
      publish_latest: ${{ steps.release.outputs.publish_latest }}
    steps:
      - id: release
        run: |
          if [[ "$GITHUB_REF_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "publish_latest=true" >>"$GITHUB_OUTPUT"
          else
            echo "publish_latest=false" >>"$GITHUB_OUTPUT"
          fi

  node_tests:
    uses: ./.github/workflows/node_test.yaml
    secrets: inherit

  go_tests:
    uses: ./.github/workflows/go_test.yaml
    secrets: inherit

  build_e2e:
    needs: [node_tests, go_tests]
    uses: ./.github/workflows/build.yaml
    permissions:
      contents: read
      packages: write
    with:
      target: premium
      build_app: false
      build_e2e: true
    secrets: inherit

  e2e_tests:
    needs: [node_tests, go_tests, build_e2e]
    uses: ./.github/workflows/e2e.yaml
    permissions:
      contents: read
      packages: write
    with:
      target: premium
    secrets: inherit

  build_app_release_oss:
    needs: [release_meta, node_tests, go_tests, e2e_tests]
    uses: ./.github/workflows/build.yaml
    with:
      target: oss
      build_app: true
      build_e2e: false
      publish_latest: ${{ needs.release_meta.outputs.publish_latest == 'true' }}
    secrets: inherit

  build_app_release_premium:
    needs: [node_tests, go_tests, e2e_tests]
    uses: ./.github/workflows/build.yaml
    with:
      target: premium
      build_app: true
      build_e2e: false
    secrets: inherit
