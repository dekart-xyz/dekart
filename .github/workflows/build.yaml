name: Dekart Build

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      build_app: { type: boolean, default: false }
      build_e2e: { type: boolean, default: false }
      build_runner_labels:
        type: string
        default: '["self-hosted","laptop-build"]'
        description: "JSON array of runner labels for build job"
      # REQUIRED – explicit destination target
      target:
        type: string # cloud | premium | oss
        required: true
        description: "Where to push & how to build"
    outputs:
      app_image:
        value: ${{ jobs.build.outputs.app_image }}
      e2e_image:
        value: ${{ jobs.build.outputs.e2e_image }}
env:
  IMAGE_CACHE_KEY: e2etest-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.build_runner_labels) }}
    outputs:
      app_image: ${{ steps.collect.outputs.app_primary }}
      e2e_image: ${{ steps.collect.outputs.e2e_primary }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        with:
          name: dekart-laptop-builder
          driver: docker-container
          use: true
          keep-state: true
          cleanup: false

      - name: Verify persistent Buildx builder
        run: |
          docker buildx inspect dekart-laptop-builder --bootstrap
          docker buildx inspect dekart-laptop-builder | grep -E 'Driver:[[:space:]]+docker-container'
          docker buildx ls | grep -E '^dekart-laptop-builder'
          docker volume inspect buildx_buildkit_dekart-laptop-builder0_state >/dev/null
          docker ps --format '{{.Names}}' | grep -E '^buildx_buildkit_dekart-laptop-builder0$'

      - id: registry
        run: |
          case "${{ inputs.target }}" in
            cloud)
              echo "REG=europe-west3-docker.pkg.dev/dekart-cloud/dekart"  >>"$GITHUB_OUTPUT"
              echo "LOGIN=gar"  >>"$GITHUB_ENV"
              echo "UX_DISABLE_VERSION_CHECK=1" >>"$GITHUB_ENV"
              echo "LICENSE_KEY_BUILD_ARG=DEKART_LICENSE_KEY=${{ secrets.DEKART_LICENSE_KEY }}" >>"$GITHUB_ENV"
              ;;
            premium)
              echo "REG=ghcr.io/dekart-xyz/dekart-premium" >>"$GITHUB_OUTPUT"
              echo "LOGIN=ghcr" >>"$GITHUB_ENV"
              echo "UX_DISABLE_VERSION_CHECK=1" >>"$GITHUB_ENV"
              echo "LICENSE_KEY_BUILD_ARG=DEKART_LICENSE_KEY=${{ secrets.DEKART_LICENSE_KEY }}" >>"$GITHUB_ENV"
              ;;
            oss)
              echo "REG=dekartxyz" >>"$GITHUB_OUTPUT"
              echo "LOGIN=dh"   >>"$GITHUB_ENV"
              echo "UX_DISABLE_VERSION_CHECK=" >>"$GITHUB_ENV"
              echo "LICENSE_KEY_BUILD_ARG=" >>"$GITHUB_ENV"
              ;;
            *)  echo "::error::Unknown target '${{ inputs.target }}'"; exit 1 ;;
          esac

      - uses: google-github-actions/setup-gcloud@v0 # GAR
        if: env.LOGIN == 'gar'
        with:
          project_id: dekart-cloud
          service_account_key: ${{ secrets.PRIVATE_GITHUB_ACTIONS_DEKART_CLOUD }}
          export_default_credentials: true
      - run: gcloud auth configure-docker europe-west3-docker.pkg.dev
        if: env.LOGIN == 'gar'

      - uses: docker/login-action@v3 # GHCR
        if: env.LOGIN == 'ghcr'
        with:
          registry: ghcr.io
          username: ${{ secrets.PREMIUM_GHCR_USERNAME }}
          password: ${{ secrets.PREMIUM_GHCR_TOKEN }}

      - uses: docker/login-action@v3 # Docker Hub
        if: env.LOGIN == 'dh'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure .npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_GH_TOKEN }}" > .npmrc
          echo "@dekart-xyz:registry=https://npm.pkg.github.com" >> .npmrc

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.REG }}/dekart
          tags: |
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: latest=false # never add “latest” automatically

      - id: collect
        run: |
          APP_TAGS='${{ steps.meta.outputs.tags }}'
          E2E_TAG="${{ steps.registry.outputs.REG }}/dekart:${IMAGE_CACHE_KEY}"

          echo "e2e_tags=$E2E_TAG"       >>"$GITHUB_OUTPUT"
          echo "app_primary=$(echo "$APP_TAGS" | head -n1)" >>"$GITHUB_OUTPUT"
          echo "e2e_primary=$E2E_TAG"    >>"$GITHUB_OUTPUT"

      - name: Build & push APP image
        if: inputs.build_app
        uses: docker/build-push-action@v6
        with:
          builder: dekart-laptop-builder
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            DEKART_UX_DISABLE_VERSION_CHECK=${{ env.UX_DISABLE_VERSION_CHECK }}
            ${{ env.LICENSE_KEY_BUILD_ARG }}

      - name: Build & push E2E image
        if: inputs.build_e2e
        env:
          BUILDKIT_PROGRESS: plain
        uses: docker/build-push-action@v6
        with:
          builder: dekart-laptop-builder
          context: .
          target: e2etest
          platforms: linux/amd64
          push: true
          tags: ${{ steps.collect.outputs.e2e_tags }}
          build-args: |
            DEKART_UX_DISABLE_VERSION_CHECK=${{ env.UX_DISABLE_VERSION_CHECK }}

      - name: Cache diagnostics (major layers)
        if: inputs.build_e2e
        run: |
          DU="$(docker buildx du --builder dekart-laptop-builder --verbose || true)"
          npm_cached=no
          go_mod_cached=no
          go_build_cached=no
          if printf '%s\n' "$DU" | grep -A4 'Description:.*npm ci --ignore-scripts' | grep -Eq 'Last used:[[:space:]]+([0-9]+[[:space:]]+(second|seconds|minute|minutes)[[:space:]]+ago|just now)'; then npm_cached=yes; fi
          if printf '%s\n' "$DU" | grep -A4 'Description:.*go mod download -x' | grep -Eq 'Last used:[[:space:]]+([0-9]+[[:space:]]+(second|seconds|minute|minutes)[[:space:]]+ago|just now)'; then go_mod_cached=yes; fi
          if printf '%s\n' "$DU" | grep -A4 'Description:.*CGO_ENABLED=1 go build ./src/server' | grep -Eq 'Last used:[[:space:]]+([0-9]+[[:space:]]+(second|seconds|minute|minutes)[[:space:]]+ago|just now)'; then go_build_cached=yes; fi
          echo "CACHE_DIAG npm_ci_cached_recent=${npm_cached} go_mod_cached_recent=${go_mod_cached} go_build_cached_recent=${go_build_cached}"
