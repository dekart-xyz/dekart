name: e2e_tests

on:
  workflow_call:
    inputs:
      # explicit image target for pull + test lane selection
      target:
        type: string          # cloud | premium | oss
        required: true

env:

  # database defaults for every spec
  DEKART_POSTGRES_PASSWORD: dekart
  DEKART_POSTGRES_USER:     postgres
  DEKART_POSTGRES_DB:       dekart

  GOOGLE_APPLICATION_CREDENTIALS: GOOGLE_APPLICATION_CREDENTIALS.json
  AWS_REGION: us-east-1
  IMAGE_CACHE_KEY: e2etest-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  e2e-cloud:
    if: ${{ inputs.target == 'premium' }}
    runs-on: ubuntu-latest

    env:
      # registry prefix + login target
      REG_PREFIX: ghcr.io/dekart-xyz/dekart-premium
      LOGIN_REG:  ghcr
      GOOGLE_CRED_SEC: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
      MAPBOX_TOKEN_SEC: ${{ secrets.DEKART_MAPBOX_TOKEN }}
      DEKART_LICENSE_KEY_SEC: ${{ secrets.DEKART_LICENSE_KEY }}


    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ${{ env.DEKART_POSTGRES_PASSWORD }}
          POSTGRES_USER:     ${{ env.DEKART_POSTGRES_USER }}
          POSTGRES_DB:       ${{ env.DEKART_POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout   5s
          --health-retries   5
        ports: ['5432:5432']

    steps:
      # credentials file for any variant that may need it
      - run: echo "$GOOGLE_CRED_SEC" > "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Download Cypress multipart fixture
        run: |
          mkdir -p /tmp/cypress/fixtures
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud storage cp gs://dekart-dev-ci-fixtures/cypress/POI25Mb.csv /tmp/cypress/fixtures/POI25Mb.csv --project=dekart-dev
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.PREMIUM_GHCR_USERNAME }}
          password: ${{ secrets.PREMIUM_GHCR_TOKEN }}


      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2

      - name: Pre-pull test image (retry)
        run: |
          image="${REG_PREFIX}/dekart:${IMAGE_CACHE_KEY}"
          for attempt in 1 2 3 4 5; do
            echo "Pulling $image (attempt $attempt)..."
            if docker pull "$image"; then
              echo "Pulled $image"
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Failed to pull $image after $attempt attempts"
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: E2E part 1 (start + login regression)
        run: |
          docker run -i \
            --network="host" \
            -v $(pwd)/${GOOGLE_APPLICATION_CREDENTIALS}:/dekart/${GOOGLE_APPLICATION_CREDENTIALS} \
            -v /tmp/cypress/fixtures/POI25Mb.csv:/dekart/cypress/fixtures/POI25Mb.csv \
            -v /tmp/cypress/videos:/dekart/cypress/videos/ \
            -v /tmp/cypress/screenshots:/dekart/cypress/screenshots/ \
            -e DEKART_LOG_DEBUG=1 \
            -e GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS \
            -e DEKART_POSTGRES_USER=$DEKART_POSTGRES_USER \
            -e DEKART_POSTGRES_PASSWORD=$DEKART_POSTGRES_PASSWORD \
            -e DEKART_POSTGRES_PORT=$DEKART_POSTGRES_PORT \
            -e DEKART_POSTGRES_HOST=localhost \
            -e DEKART_BIGQUERY_PROJECT_ID=dekart-dev \
            -e DEKART_CLOUD_STORAGE_BUCKET=dekart-dev \
            -e DEKART_STORAGE=USER \
            -e DEKART_DATASOURCE=USER \
            -e DEKART_ALLOW_FILE_UPLOAD=1 \
            -e DEKART_REQUIRE_GOOGLE_OAUTH=1 \
            -e DEKART_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }} \
            -e DEKART_GOOGLE_OAUTH_SECRET=${{ secrets.GOOGLE_OAUTH_SECRET }} \
            -e DEKART_DEV_REFRESH_TOKEN=${{ secrets.DEV_REFRESH_TOKEN_INFO }} \
            -e DEKART_DATA_ENCRYPTION_KEY=projects/910252011719/secrets/dekart-dev-user-data-encoding-key/versions/latest \
            -e DEKART_CORS_ORIGIN=http://localhost:3000 \
            -e DEKART_ALLOW_WORKSPACE_CREATION=1 \
            -e DEKART_UX_DISABLE_VERSION_CHECK=1 \
            -e DEKART_DEV_NO_DATASET_CACHE=1 \
            -e DEKART_MAPBOX_TOKEN=$MAPBOX_TOKEN_SEC \
            -e DEKART_LICENSE_KEY=$DEKART_LICENSE_KEY_SEC \
            -e DEKART_CLOUD=1 \
            -e TEST_SPEC=cypress/e2e/cloud/cloudBasicFlowStart.cy.js \
            -e CYPRESS_CI=1 \
            ${REG_PREFIX}/dekart:${{ env.IMAGE_CACHE_KEY }}
      - name: E2E part 2
        run: |
          docker run -i \
            --network="host" \
            -v $(pwd)/${GOOGLE_APPLICATION_CREDENTIALS}:/dekart/${GOOGLE_APPLICATION_CREDENTIALS} \
            -v /tmp/cypress/fixtures/POI25Mb.csv:/dekart/cypress/fixtures/POI25Mb.csv \
            -v /tmp/cypress/videos:/dekart/cypress/videos/ \
            -v /tmp/cypress/screenshots:/dekart/cypress/screenshots/ \
            -e DEKART_LOG_DEBUG=1 \
            -e GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS \
            -e DEKART_POSTGRES_USER=$DEKART_POSTGRES_USER \
            -e DEKART_POSTGRES_PASSWORD=$DEKART_POSTGRES_PASSWORD \
            -e DEKART_POSTGRES_PORT=$DEKART_POSTGRES_PORT \
            -e DEKART_POSTGRES_HOST=localhost \
            -e DEKART_BIGQUERY_PROJECT_ID=dekart-dev \
            -e DEKART_CLOUD_STORAGE_BUCKET=dekart-dev \
            -e DEKART_STORAGE=USER \
            -e DEKART_DATASOURCE=USER \
            -e DEKART_ALLOW_FILE_UPLOAD=1 \
            -e DEKART_REQUIRE_GOOGLE_OAUTH=1 \
            -e DEKART_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }} \
            -e DEKART_GOOGLE_OAUTH_SECRET=${{ secrets.GOOGLE_OAUTH_SECRET }} \
            -e DEKART_DEV_REFRESH_TOKEN=${{ secrets.DEV_REFRESH_TOKEN }} \
            -e DEKART_DATA_ENCRYPTION_KEY=projects/910252011719/secrets/dekart-dev-user-data-encoding-key/versions/latest \
            -e DEKART_CORS_ORIGIN=http://localhost:3000 \
            -e DEKART_ALLOW_WORKSPACE_CREATION=1 \
            -e DEKART_UX_DISABLE_VERSION_CHECK=1 \
            -e DEKART_DEV_NO_DATASET_CACHE=1 \
            -e DEKART_MAPBOX_TOKEN=$MAPBOX_TOKEN_SEC \
            -e DEKART_LICENSE_KEY=$DEKART_LICENSE_KEY_SEC \
            -e DEKART_CLOUD=1 \
            -e TEST_SPEC=cypress/e2e/cloud/cloudBasicFlowEnd.cy.js \
            -e CYPRESS_CI=1 \
            ${REG_PREFIX}/dekart:${{ env.IMAGE_CACHE_KEY }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cloud
          path: /tmp/cypress

  e2e-premium-oss:
    runs-on: ubuntu-latest

    env:
      # secret → env for easy reuse in matrix
      GOOGLE_CRED_SEC:         ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
      GOOGLE_OAUTH_ID_SEC:     ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_SECRET_SEC: ${{ secrets.GOOGLE_OAUTH_SECRET }}
      DEV_REFRESH_TOKEN_SEC:   ${{ secrets.DEV_REFRESH_TOKEN }}
      S3_BUCKET_SEC:           ${{ secrets.S3_BUCKET }}
      AWS_KEY_SEC:             ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_SEC:          ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SNOW_ID_SEC:             ${{ secrets.SNOWFLAKE_ACCOUNT_ID }}
      SNOW_USER_SEC:           ${{ secrets.SNOWFLAKE_USER }}
      SNOW_PASS_SEC:           ${{ secrets.SNOWFLAKE_PASSWORD }}
      MAPBOX_TOKEN_SEC:        ${{ secrets.DEKART_MAPBOX_TOKEN }}
      DEKART_LICENSE_KEY_SEC:  ${{ secrets.DEKART_LICENSE_KEY }}

      # registry prefix + login target
      REG_PREFIX: ${{ inputs.target == 'premium' && 'ghcr.io/dekart-xyz/dekart-premium' || 'dekartxyz' }}
      LOGIN_REG:  ${{ inputs.target == 'premium' && 'ghcr' || 'dh' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: google-oauth
            spec: cypress/e2e/google-oauth
            extra_env: |
              -e DEKART_LICENSE_KEY=$DEKART_LICENSE_KEY_SEC \
              -e DEKART_REQUIRE_GOOGLE_OAUTH=1 \
              -e DEKART_GOOGLE_OAUTH_CLIENT_ID=$GOOGLE_OAUTH_ID_SEC \
              -e DEKART_GOOGLE_OAUTH_SECRET=$GOOGLE_OAUTH_SECRET_SEC \
              -e DEKART_DEV_REFRESH_TOKEN=$DEV_REFRESH_TOKEN_SEC \
              -e DEKART_STORAGE=USER \
              -e DEKART_DATASOURCE=USER \
              -e DEKART_ALLOW_FILE_UPLOAD=1 \

          - id: bigquery
            spec: cypress/e2e/bq
            extra_env: |
              -e GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS \
              -e DEKART_BIGQUERY_PROJECT_ID=dekart-dev \
              -e DEKART_CLOUD_STORAGE_BUCKET=dekart-dev \
              -e DEKART_STORAGE=GCS \
              -e DEKART_DATASOURCE=BQ \
              -e DEKART_ALLOW_FILE_UPLOAD=1 \

          - id: version-banner
            spec: cypress/e2e/version/spec.cy.js
            target: oss
            extra_env: |
              -e GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS \
              -e DEKART_BIGQUERY_PROJECT_ID=dekart-dev \
              -e DEKART_CLOUD_STORAGE_BUCKET=dekart-dev \
              -e DEKART_STORAGE=GCS \
              -e DEKART_DATASOURCE=BQ \
              -e DEKART_VERSION_CHECK_URL=http://localhost:3000/api/v1/version \
              -e DEKART_VERSION_CHECK_FORCE_CURRENT_VERSION=0.0.0 \

          - id: athena
            spec: cypress/e2e/athena
            extra_env: |
              -e DEKART_STORAGE=S3 \
              -e DEKART_DATASOURCE=ATHENA \
              -e DEKART_CLOUD_STORAGE_BUCKET=$S3_BUCKET_SEC \
              -e DEKART_ATHENA_S3_OUTPUT_LOCATION=$S3_BUCKET_SEC \
              -e DEKART_ATHENA_CATALOG=AwsDataCatalog \
              -e AWS_REGION=$AWS_REGION \
              -e AWS_ACCESS_KEY_ID=$AWS_KEY_SEC \
              -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_SEC \
              -e DEKART_ALLOW_FILE_UPLOAD=1 \

          - id: snowflake-s3
            spec: cypress/e2e/snowflake-s3
            extra_env: |
              -e DEKART_LICENSE_KEY=$DEKART_LICENSE_KEY_SEC \
              -e DEKART_STORAGE=S3 \
              -e DEKART_DATASOURCE=SNOWFLAKE \
              -e DEKART_CLOUD_STORAGE_BUCKET=$S3_BUCKET_SEC \
              -e AWS_REGION=$AWS_REGION \
              -e AWS_ACCESS_KEY_ID=$AWS_KEY_SEC \
              -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_SEC \
              -e DEKART_SNOWFLAKE_ACCOUNT_ID=$SNOW_ID_SEC \
              -e DEKART_SNOWFLAKE_USER=$SNOW_USER_SEC \
              -e DEKART_SNOWFLAKE_PASSWORD=$SNOW_PASS_SEC \
              -e DEKART_REQUIRE_AMAZON_OIDC=1 \
              -e DEKART_DEV_CLAIMS_EMAIL=test@gmail.com \
              -e DEKART_ALLOW_FILE_UPLOAD=1 \

          - id: snowflake-sqlite
            spec: cypress/e2e/snowflake
            extra_env: |
              -e DEKART_STORAGE=SNOWFLAKE \
              -e DEKART_DATASOURCE=SNOWFLAKE \
              -e DEKART_SNOWFLAKE_ACCOUNT_ID=$SNOW_ID_SEC \
              -e DEKART_SNOWFLAKE_USER=$SNOW_USER_SEC \
              -e DEKART_SNOWFLAKE_PASSWORD=$SNOW_PASS_SEC \
              -e DEKART_SQLITE_DB_PATH=./dekart.db \
              -e DEKART_REQUIRE_SNOWFLAKE_CONTEXT=1 \
              -e DEKART_DEV_CLAIMS_EMAIL=bilonenko.v2@gmail.com \

          - id: local-user-postgres
            spec: cypress/e2e/local/userDefinedConnectionHappyPath.cy.js
            extra_env: |
              -e DEKART_STORAGE=USER \
              -e DEKART_DATASOURCE=USER \
              -e DEKART_ALLOW_FILE_UPLOAD=1 \

          - id: local-mcp-postgres
            spec: cypress/e2e/local/mcpPgHappyPath.cy.js
            extra_env: |
              -e DEKART_API_BASE_URL=http://localhost:3000/api/v1 \
              -e DEKART_STORAGE=USER \
              -e DEKART_DATASOURCE=USER \
              -e DEKART_ALLOW_FILE_UPLOAD=1 \

          - id: pg-s3-postgres
            spec: cypress/e2e/pg-s3/happyPath.cy.js
            extra_env: |
              -e DEKART_STORAGE=S3 \
              -e DEKART_DATASOURCE=PG \
              -e DEKART_CLOUD_STORAGE_BUCKET=$S3_BUCKET_SEC \
              -e DEKART_POSTGRES_DATASOURCE_CONNECTION=postgres://$DEKART_POSTGRES_USER:$DEKART_POSTGRES_PASSWORD@localhost:5432/dekart_geo?sslmode=disable \
              -e AWS_REGION=$AWS_REGION \
              -e AWS_ACCESS_KEY_ID=$AWS_KEY_SEC \
              -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_SEC \

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: ${{ env.DEKART_POSTGRES_PASSWORD }}
          POSTGRES_USER:     ${{ env.DEKART_POSTGRES_USER }}
          POSTGRES_DB:       ${{ env.DEKART_POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout   5s
          --health-retries   5
        ports: ['5432:5432']

    steps:
      # credentials file for any variant that may need it
      - run: echo "$GOOGLE_CRED_SEC" > "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Download Cypress multipart fixture
        run: |
          mkdir -p /tmp/cypress/fixtures
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud storage cp gs://dekart-dev-ci-fixtures/cypress/POI25Mb.csv /tmp/cypress/fixtures/POI25Mb.csv --project=dekart-dev

      - name: Seed PostgreSQL test data (dekart_geo.sample.geospatial_points)
        run: |
          set -euo pipefail
          pg_cid="$(docker ps --filter ancestor=postgres --format '{{.ID}}' | head -n 1)"
          test -n "$pg_cid"
          docker exec -e PGPASSWORD="$DEKART_POSTGRES_PASSWORD" "$pg_cid" \
            psql -U "$DEKART_POSTGRES_USER" -d postgres -v ON_ERROR_STOP=1 -c "SELECT 1 FROM pg_database WHERE datname='dekart_geo'" | grep -q 1 \
            || docker exec -e PGPASSWORD="$DEKART_POSTGRES_PASSWORD" "$pg_cid" \
              psql -U "$DEKART_POSTGRES_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE dekart_geo"
          docker exec -i -e PGPASSWORD="$DEKART_POSTGRES_PASSWORD" "$pg_cid" \
            psql -U "$DEKART_POSTGRES_USER" -d dekart_geo -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS sample;
          CREATE TABLE IF NOT EXISTS sample.geospatial_points (
            id SERIAL PRIMARY KEY,
            name TEXT NOT NULL,
            category TEXT NOT NULL,
            longitude DOUBLE PRECISION NOT NULL,
            latitude DOUBLE PRECISION NOT NULL,
            geom_wkt TEXT NOT NULL
          );
          TRUNCATE TABLE sample.geospatial_points;
          INSERT INTO sample.geospatial_points (name, category, longitude, latitude, geom_wkt)
          SELECT
            'poi_' || gs::text,
            CASE WHEN gs % 3 = 0 THEN 'food' WHEN gs % 3 = 1 THEN 'park' ELSE 'shop' END,
            12.45 + (gs::double precision * 0.01),
            55.60 + (gs::double precision * 0.005),
            'POINT(' || (12.45 + (gs::double precision * 0.01))::text || ' ' || (55.60 + (gs::double precision * 0.005))::text || ')'
          FROM generate_series(1, 150) AS gs;
          SQL

      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2

      # --------------------------- registry login ----------------------------
      - uses: docker/login-action@v3
        if: env.LOGIN_REG == 'ghcr'
        with:
          registry: ghcr.io
          username: ${{ secrets.PREMIUM_GHCR_USERNAME }}
          password: ${{ secrets.PREMIUM_GHCR_TOKEN }}

      - uses: docker/login-action@v3
        if: env.LOGIN_REG == 'dh'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pre-pull test image (retry)
        if: ${{ !matrix.target || matrix.target == inputs.target }}
        run: |
          image="${REG_PREFIX}/dekart:${IMAGE_CACHE_KEY}"
          for attempt in 1 2 3 4 5; do
            echo "Pulling $image (attempt $attempt)..."
            if docker pull "$image"; then
              echo "Pulled $image"
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Failed to pull $image after $attempt attempts"
              exit 1
            fi
            sleep $((attempt * 10))
          done


      # ----------------------------- run tests -------------------------------
      - name: Run ${{ matrix.id }} suite
        if: ${{ !matrix.target || matrix.target == inputs.target }}
        run: |
          docker run -i --network host \
            -v /tmp/cypress/videos:/dekart/cypress/videos \
            -v /tmp/cypress/screenshots:/dekart/cypress/screenshots \
            -v /tmp/cypress/fixtures/POI25Mb.csv:/dekart/cypress/fixtures/POI25Mb.csv \
            -v $(pwd)/$GOOGLE_APPLICATION_CREDENTIALS:/dekart/$GOOGLE_APPLICATION_CREDENTIALS \
            -e DEKART_LOG_DEBUG=1 \
            -e DEKART_POSTGRES_USER=$DEKART_POSTGRES_USER \
            -e DEKART_POSTGRES_PASSWORD=$DEKART_POSTGRES_PASSWORD \
            -e DEKART_POSTGRES_PORT=$DEKART_POSTGRES_PORT \
            -e DEKART_POSTGRES_HOST=localhost \
            -e DEKART_CORS_ORIGIN=http://localhost:3000 \
            -e DEKART_MAPBOX_TOKEN=$MAPBOX_TOKEN_SEC \
            -e TEST_SPEC=${{ matrix.spec }} \
            -e CYPRESS_CI=1 \
            ${{ matrix.extra_env }} \
            ${REG_PREFIX}/dekart:${{ env.IMAGE_CACHE_KEY }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ matrix.id }}
          path: /tmp/cypress
